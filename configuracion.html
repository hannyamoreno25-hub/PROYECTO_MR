<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración | CONTROL MR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="configuraciones.css">
</head>
<body>

<header class="topbar shadow-sm">
    <div class="logo-container d-flex align-items-center">
        <img src="../WhatsApp Image 2026-02-05 at 4.45.12 PM (1).jpeg" alt="Logo" class="nav-logo me-2">
        <span class="title d-none d-md-inline fw-bold">CONTROL TÉCNICO</span>
    </div>

    <div class="user-menu-container">
        <div class="dropdown">
            <button class="btn btn-light dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i>
                <span id="userNameDisplay">Usuario</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                <li><h6 class="dropdown-header">Mi Cuenta</h6></li>
                <li><a class="dropdown-item" href="tecnico.html"><i class="bi bi-house me-2"></i>Inicio</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger fw-bold" href="index.html" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="content container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <section class="card-section formal-style shadow p-4">
                <h4 class="section-title-formal text-center mb-4">MI PERFIL</h4>
                
                <div class="profile-preview-container" id="previewContainer">
                    <i class="bi bi-person-fill" id="defaultIcon"></i>
                    <img src="" alt="Foto de Perfil" id="currentPhoto" style="display: none;">
                </div>

                <form id="formConfiguracion">
                    <div class="mb-4">
                        <label for="inputFoto" class="form-label fw-bold text-secondary">Actualizar Fotografía</label>
                        <input class="form-control" type="file" id="inputFoto" accept="image/*" onchange="previewImage(event)">
                        <div class="form-text mt-2 text-center">JPG o PNG. Máximo 2MB.</div>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="button" class="btn-formal-black" onclick="guardarConfiguracion(event)">
                            <i class="bi bi-check-circle me-2"></i>GUARDAR CAMBIOS
                        </button>
                        <a href="index.html" class="btn-formal-outline text-decoration-none text-center">VOLVER AL INICIO</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="configuraciones.js"></script>
</body>
</html>
