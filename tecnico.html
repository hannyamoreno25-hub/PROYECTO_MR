<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Control Técnico | CONTROL MR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="tecnico.css">
</head>
<body>

<header class="topbar shadow-sm">
    <div class="logo-container d-flex align-items-center">
        <img src="./WhatsApp Image 2026-02-05 at 4.45.12 PM (1).jpeg" alt="Logo" class="nav-logo me-2">
        <span class="title d-none d-md-inline fw-bold tracking-wide">CONTROL TÉCNICO</span>
    </div>

    <div class="user-menu-container d-flex align-items-center">
        <div class="dropdown">
            <button class="btn btn-user dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle me-1"></i>
                <span id="userNameDisplay">Usuario</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li><h6 class="dropdown-header">Mi Cuenta</h6></li>
                <li><a class="dropdown-item" href="../configuraciones/configuracion.html"><i class="bi bi-gear me-2"></i>Configuración</a></li>
                <li><a class="dropdown-item" href="../tecnico/programar_visita/programar_visita.html"><i class="bi bi-calendar-event me-2"></i>Programar visita</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger fw-bold" href="../loig/index.html" onclick="cerrarSesion()">
                        <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="content container mt-5">
    <div class="row justify-content-center gap-4">
        
        <section id="jornada" class="col-md-5 card-section shadow-sm formal-style">
            <h4 class="section-title-formal text-center">CONTROL DE JORNADA</h4>
            
            <div class="camera-box mx-auto position-relative">
                <video id="videoJornada" autoplay muted playsinline></video>
                <canvas id="canvasJornada" style="display:none;"></canvas>
                <img id="fotoJornada" style="display:none; width:100%; height:100%; object-fit:cover;" />
            </div>
            
            <div class="button-group d-grid gap-2 mt-3">
                <button class="btn-formal-black" id="btnIniJornada" onclick="iniciarJornada()">INICIAR JORNADA</button>
                <button class="btn-formal-outline" id="btnFinJornada" onclick="finalizarJornada()" disabled>FINALIZAR Y ENVIAR</button>
                <button class="btn btn-danger btn-sm mt-2" onclick="borrarDatos('jornada')">BORRAR DATOS</button>
            </div>
            
            <div class="info-display bg-light p-3 mt-4 border">
                <p class="mb-1"><strong>Usuario:</strong> <span id="userJornada"></span></p>
                <p class="mb-1"><strong>Estado:</strong> <span id="statusJornada" class="badge bg-secondary">Inactivo</span></p>
                <p class="mb-1"><strong>Inicio:</strong> <span id="horaInicioJornada">--:--</span></p>
                <p class="mb-1"><strong>Fin:</strong> <span id="horaFinJornada">--:--</span></p>
                <p class="mb-1"><strong>Tiempo Transcurrido:</strong> <span id="timerJornada" class="fw-bold">00:00:00</span></p>
            </div>
        </section>

        <section id="visitas" class="col-md-5 card-section shadow-sm formal-style">
            <h4 class="section-title-formal text-center">
                <i class="bi bi-geo-alt-fill me-2"></i>REGISTRO DE VISITA
            </h4>
            
            <div class="mb-3">
                <label for="sucursalSelect" class="form-label-formal">SELECCIONA LA SUCURSAL:</label>
                <select class="form-select-formal" id="sucursalSelect">
                    <option value="" selected disabled>-- Elige una sucursal --</option>
                    <option value="Sucursal Centro">Sucursal Centro</option>
                    <option value="Sucursal Norte">Sucursal Norte</option>
                    <option value="Sucursal Sur">Sucursal Sur</option>
                </select>
            </div>

            <div class="camera-box mx-auto position-relative mb-3">
                <video id="videoVisita" autoplay muted playsinline></video>
                <canvas id="canvasVisita" style="display:none;"></canvas>
                <img id="fotoVisita" style="display:none; width:100%; height:100%; object-fit:cover;" />
            </div>
            
            <div class="button-group d-grid gap-2">
                <button class="btn-formal-black" id="btnIniVisita" onclick="iniciarVisita()">INICIO DE VISITA</button>
                <button class="btn-formal-outline" id="btnFinVisita" onclick="finalizarVisita()" disabled>FINALIZAR Y ENVIAR</button>
                <button class="btn btn-outline-danger btn-sm mt-2" onclick="borrarDatos('visita')">BORRAR DATOS</button>
            </div>
            
            <div class="info-display bg-light p-3 mt-4 border">
                <p class="mb-1"><strong>Usuario:</strong> <span id="userVisita"></span></p>
                <p class="mb-1"><strong>Sucursal:</strong> <span id="sucursalElegida">Ninguna</span></p>
                <p class="mb-1"><strong>Estado:</strong> <span id="statusVisita" class="badge bg-secondary">Fuera de Sucursal</span></p>
                <p class="mb-1"><strong>Tiempo:</strong> <span id="timerVisita" class="fw-bold">00:00:00</span></p>
            </div>
        </section>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="tecnico.js"></script>
</body>
</html>
